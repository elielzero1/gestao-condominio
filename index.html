<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Condomínio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --primary: #2D6CDF;
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #333;
  --success: #2ecc71;
  --danger: #e74c3c;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  background: var(--primary);
  color: white;
  padding: 15px;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

.header h1 {
  margin: 0;
  font-size: 20px;
}

select {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* DASHBOARD */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 15px;
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.05);
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #777;
}

.card p {
  font-size: 18px;
  margin-top: 8px;
  font-weight: bold;
}

/* GRAFICO */
.chart-container {
  padding: 15px;
}

/* DESPESAS */
.despesas {
  margin: 15px;
}

/* LISTA */
.lista {
  padding: 15px;
}

.sobrado {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  margin-bottom: 8px;
  background: var(--card);
  border-radius: 12px;
}

.status {
  font-weight: bold;
}

.pago { color: var(--success); }
.nao-pago { color: var(--danger); }

</style>
</head>

<body>

<div class="header">
  <h1>🏘️ Condomínio</h1>
  <select id="mesSelect"></select>
</div>

<div class="dashboard">
  <div class="card"><h3>Arrecadado</h3><p id="arrecadado"></p></div>
  <div class="card"><h3>Caixa</h3><p id="caixa"></p></div>
  <div class="card"><h3>Pagos</h3><p id="pagos"></p></div>
  <div class="card"><h3>Não pagos</h3><p id="naoPagos"></p></div>
</div>

<div class="chart-container">
  <canvas id="grafico"></canvas>
</div>

<div class="card despesas">
  <h3>Despesas</h3>
  <p id="despesas"></p>
</div>

<div class="lista" id="lista"></div>

<script>
const sheetID = "11iwcfGg6l--xc-yQHsLSxUFA8mTxuLeDk-0un3f698I";

const resumoURL = `https://opensheet.elk.sh/${sheetID}/Resumo`;
const sobradosURL = `https://opensheet.elk.sh/${sheetID}/Sobrados`;

let chart;

fetch(resumoURL)
.then(res => res.json())
.then(resumos => {
  const select = document.getElementById("mesSelect");

  resumos.forEach((r, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = r.Mes;
    select.appendChild(opt);
  });

  carregar(resumos, 0);

  select.addEventListener("change", e => {
    carregar(resumos, e.target.value);
  });
});

function carregar(resumos, index) {
  const info = resumos[index];

  document.getElementById("arrecadado").textContent = "R$ " + info["Total Arrecadado"];
  document.getElementById("caixa").textContent = "R$ " + info["Total em Caixa"];
  document.getElementById("despesas").textContent = info.Despesas;

  fetch(sobradosURL)
  .then(res => res.json())
  .then(data => {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    let pagos = 0;
    let naoPagos = 0;

    data.forEach(item => {

      const isNaoPago = item.Status.toLowerCase().includes("não");

      if (isNaoPago) naoPagos++;
      else pagos++;

      const div = document.createElement("div");
      div.className = "sobrado";

      div.innerHTML = `
        <span>Sobrado ${item.Sobrado}</span>
        <span class="status ${isNaoPago ? 'nao-pago':'pago'}">${item.Status}</span>
      `;

      lista.appendChild(div);
    });

    document.getElementById("pagos").textContent = pagos;
    document.getElementById("naoPagos").textContent = naoPagos;

    atualizarGrafico(pagos, naoPagos);

  });
}

function atualizarGrafico(pagos, naoPagos) {
  const ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Pagos", "Não pagos"],
      datasets: [{
        data: [pagos, naoPagos],
        backgroundColor: ["#2ecc71", "#e74c3c"]
      }]
    },
    options: {
      plugins: {
        legend: { position: "bottom" }
      }
    }
  });
}
</script>

</body>
</html>
