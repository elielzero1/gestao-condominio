<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Condomínio Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    padding: 15px;
  }

  h1 {
    text-align: center;
  }

  .top-bar {
    text-align: center;
    margin-bottom: 20px;
  }

  select {
    padding: 8px;
    font-size: 16px;
  }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
  }

  .card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .card p {
    font-size: 20px;
    font-weight: bold;
  }

  canvas {
    margin: 20px auto;
    max-width: 300px;
  }

  .lista {
    margin-top: 20px;
  }

  .sobrado {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin-bottom: 6px;
    background: white;
    border-radius: 8px;
  }

  .pago { color: green; font-weight: bold; }
  .nao-pago { color: red; font-weight: bold; }

</style>
</head>

<body>

<h1>📊 Condomínio</h1>

<div class="top-bar">
  <label>Selecionar mês:</label>
  <select id="mesSelect"></select>
</div>

<div class="dashboard">
  <div class="card"><h3>Arrecadado</h3><p id="arrecadado"></p></div>
  <div class="card"><h3>Caixa</h3><p id="caixa"></p></div>
  <div class="card"><h3>Pagos</h3><p id="pagos"></p></div>
  <div class="card"><h3>Não pagos</h3><p id="naoPagos"></p></div>
</div>

<canvas id="grafico"></canvas>

<div class="card">
  <h3>Despesas</h3>
  <p id="despesas"></p>
</div>

<div class="lista" id="lista"></div>

<script>
const sheetID = "SEU_ID_AQUI";

const resumoURL = `https://opensheet.elk.sh/${sheetID}/Resumo`;
const sobradosURL = `https://opensheet.elk.sh/${sheetID}/Sobrados`;

let chart;

// carregar meses
fetch(resumoURL)
.then(res => res.json())
.then(resumos => {
  const select = document.getElementById("mesSelect");

  resumos.forEach((r, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = r.Mes;
    select.appendChild(opt);
  });

  carregarDados(resumos, 0);

  select.addEventListener("change", e => {
    carregarDados(resumos, e.target.value);
  });
});

function carregarDados(resumos, index) {
  const info = resumos[index];

  document.getElementById("arrecadado").textContent = "R$ " + info["Total Arrecadado"];
  document.getElementById("caixa").textContent = "R$ " + info["Total em Caixa"];
  document.getElementById("despesas").textContent = info.Despesas;

  fetch(sobradosURL)
  .then(res => res.json())
  .then(data => {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    let pagos = 0;
    let naoPagos = 0;

    data.forEach(item => {

      // se tiver coluna Mes na planilha, descomente:
      // if (item.Mes !== info.Mes) return;

      const isNaoPago = item.Status.toLowerCase().includes("não");

      if (isNaoPago) naoPagos++;
      else pagos++;

      const div = document.createElement("div");
      div.className = "sobrado";

      div.innerHTML = `
        <span>Sobrado ${item.Sobrado}</span>
        <span class="${isNaoPago ? 'nao-pago':'pago'}">${item.Status}</span>
      `;

      lista.appendChild(div);
    });

    document.getElementById("pagos").textContent = pagos;
    document.getElementById("naoPagos").textContent = naoPagos;

    atualizarGrafico(pagos, naoPagos);

  });
}

function atualizarGrafico(pagos, naoPagos) {
  const ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels: ["Pagos", "Não Pagos"],
      datasets: [{
        data: [pagos, naoPagos],
        backgroundColor: ["green", "red"]
      }]
    }
  });
}
</script>

</body>
</html>
