<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Condomínio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f7f6; }
        .container { padding: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { margin: 0; color: #555; font-size: 0.9rem; }
        .card p { font-size: 1.5rem; font-weight: bold; color: #2c3e50; margin: 10px 0 0; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #00c4cc; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Gestão Condomínio Ilka</h2>
        
        <div class="card-grid">
            <div class="card"><h3>Saldo em Caixa</h3><p>R$ 12.450,00</p></div>
            <div class="card"><h3>Inadimplência</h3><p>8%</p></div>
            <div class="card"><h3>Manutenções</h3><p>2 Pendentes</p></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Unidade</th>
                    <th>Morador</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                <tr><td>Apt 101</td><td>João Silva</td><td>Pago</td></tr>
                <tr><td>Apt 102</td><td>Maria Luz</td><td style="color: red;">Pendente</td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
